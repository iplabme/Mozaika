<!doctype html>
<html lang="ru" data-mozaika-brandbook="mozaika-brandbook/v1">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Карточки спикера</title>
  <style>
    :root{
      --canvas:#FAF9F5;--ink:#141413;--muted:#5E5D59;--warm:#F0EEE6;
      --white:#FFFFFF;--focus:#388F76;--focus-2:#59B295;--mint:#E8F0ED;
      --rose:#D787A3;--blue:#7FA9D2;--lavender:#C9C4F5;--lime:#D9F2A4;
      --line:#D8D5CC;--radius:26px;--shadow:0 24px 70px rgba(20,20,19,.13);
      --sans:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
      --serif:Georgia,"Times New Roman",serif;
    }
    *{box-sizing:border-box}html,body{margin:0;min-height:100%}
    body{display:grid;place-items:center;padding:20px;background:var(--canvas);color:var(--ink);font-family:var(--sans)}
    button{font:inherit}.deck{width:min(100%,420px)}
    .shell{position:relative;height:700px;overflow:hidden;border:1px solid var(--line);border-radius:var(--radius);background:var(--white);box-shadow:var(--shadow);display:flex;flex-direction:column}
    .accent{height:5px;background:var(--focus);flex:0 0 auto}.viewport{flex:1;overflow:auto;padding:26px 26px 86px;scrollbar-width:none}.viewport::-webkit-scrollbar{display:none}
    .kicker{display:flex;justify-content:space-between;gap:14px;align-items:center;color:var(--muted);font-size:11px;font-weight:750;letter-spacing:.08em;text-transform:uppercase}
    .section{padding:5px 10px;border-radius:999px;background:var(--mint);color:var(--focus)}
    h1{margin:18px 0 10px;font-size:34px;line-height:1.04;letter-spacing:-.035em}h2{margin:16px 0 8px;font-size:25px;line-height:1.08;letter-spacing:-.025em}
    .purpose{margin:0;color:var(--muted);font-family:var(--serif);font-size:16px;line-height:1.45}
    .label{margin:23px 0 9px;color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase}
    .say{margin:0;padding:0;list-style:none;display:grid;gap:9px}.say li{position:relative;padding:12px 14px 12px 39px;border-top:1px solid var(--line);font-size:14px;line-height:1.38}.say li::before{content:"";position:absolute;left:14px;top:17px;width:9px;height:9px;border-radius:50%;background:var(--focus)}
    .evidence{padding:14px 15px;border-radius:16px;background:var(--mint);border-left:4px solid var(--focus)}.evidence strong{display:block;margin-bottom:4px;font-size:14px}.evidence span{display:block;color:var(--muted);font-size:11px;line-height:1.4}.evidence+.evidence{margin-top:8px}
    .cue-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.cue{min-height:112px;padding:13px;border:1px solid var(--line);border-radius:16px;background:var(--canvas)}.cue b{display:block;color:var(--focus);font-size:10px;letter-spacing:.07em;text-transform:uppercase}.cue p{margin:8px 0 0;font-size:12px;line-height:1.42}
    .caution{margin-top:10px;padding:12px 14px;border-radius:14px;background:#F8ECEF;border-left:4px solid var(--rose);font-size:12px;line-height:1.42}
    .cover{min-height:100%;display:flex;flex-direction:column;justify-content:space-between}.cover .eyebrow{display:inline-flex;align-self:flex-start;padding:6px 11px;border-radius:999px;background:var(--mint);color:var(--focus);font-size:11px;font-weight:800}.cover h1{font-size:46px}.cover .summary{font-family:var(--serif);font-size:18px;line-height:1.5;color:var(--muted)}.cover .chips{display:flex;flex-wrap:wrap;gap:7px}.chip{padding:6px 10px;border-radius:999px;background:var(--warm);font-size:11px}.start{width:100%;margin-top:18px;padding:13px 16px;border:0;border-radius:14px;background:var(--ink);color:var(--white);font-weight:750;cursor:pointer}
    .nav{position:absolute;inset:auto 0 0;display:grid;grid-template-columns:38px 1fr 38px;align-items:center;gap:10px;padding:12px 16px;background:rgba(255,255,255,.95);border-top:1px solid var(--line);backdrop-filter:blur(8px)}
    .arrow{width:36px;height:36px;border:1px solid var(--line);border-radius:50%;background:var(--white);color:var(--focus);cursor:pointer}.arrow:disabled{opacity:.28}.dots{display:flex;justify-content:center;align-items:center;gap:5px;overflow:hidden}.dot{width:7px;height:7px;padding:0;border:0;border-radius:99px;background:var(--line);cursor:pointer;transition:.2s}.dot.active{width:24px;background:var(--focus)}
    .under{display:flex;justify-content:space-between;margin-top:12px;color:var(--muted);font-size:11px}.counter{font-weight:800;color:var(--ink)}
    .enter{animation:enter .28s ease both}@keyframes enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @media(max-width:470px){body{padding:0}.deck{width:100%}.shell{height:100dvh;border:0;border-radius:0}.under{display:none}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    @media print{body{display:block;padding:0}.deck{width:100%}.shell{height:auto;border:0;box-shadow:none}.nav,.under{display:none}.viewport{overflow:visible;padding:0}.print-card{break-after:page;min-height:100vh;padding:24mm}}
  </style>
</head>
<body data-mozaika-surface="speaker-story-cards" data-mozaika-template="speaker-story-cards/v1">
  <main class="deck" aria-label="Карточки-подсказки для выступления">
    <section class="shell"><div class="accent"></div><div class="viewport" id="viewport"></div>
      <nav class="nav" aria-label="Навигация по карточкам"><button class="arrow" id="prev" aria-label="Предыдущая карточка">←</button><div class="dots" id="dots"></div><button class="arrow" id="next" aria-label="Следующая карточка">→</button></nav>
    </section>
    <div class="under"><span class="counter" id="counter"></span><span>Используйте ← → или свайп</span></div>
  </main>
  <script>
    /* Renderer: replace only this object with validated speaker-card content.
       Keep machine ids, hashes, contract versions and review metadata in the
       adjacent internal JSON contract, never in this owner-visible HTML. */
    const DECK={
      title:"Название презентации",
      summary:"Коротко: какую историю рассказываем, для кого и к какому решению ведём.",
      chips:["Время: 12 минут","10 слайдов","Вопросы в конце"],
      cards:[
        {section:"Открытие",title:"Название первого слайда",purpose:"Зачем этот слайд нужен в истории.",say:["Начните с главного вывода, не пересказывайте заголовок.","Сформулируйте контекст одним коротким предложением."],evidence:[{fact:"Опорный факт или цифра",source:"Понятный источник и период"}],visual:"Покажите на главный график и назовите оси сравнения.",transition:"Свяжите вывод со следующим вопросом истории.",caution:"Не делайте причинный вывод, если данные показывают только связь.",timing:"45 сек"},
        {section:"Развитие",title:"Название второго слайда",purpose:"Какой шаг аргумента этот экран доказывает.",say:["Назовите изменение и его масштаб.","Объясните, почему это важно руководителю."],evidence:[{fact:"Второй проверенный факт",source:"Источник рядом с утверждением"}],visual:"Сначала покажите общий тренд, затем выделенный сегмент.",transition:"Перейдите от наблюдения к управленческому следствию.",caution:null,timing:"60 сек"}
      ]
    };
    let index=0,touchX=null;const viewport=document.getElementById('viewport');
    const esc=value=>String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    function cover(){return `<article class="cover enter"><div><span class="eyebrow">Карточки спикера</span><h1>${esc(DECK.title)}</h1><p class="summary">${esc(DECK.summary)}</p></div><div><div class="chips">${(DECK.chips||[]).map(x=>`<span class="chip">${esc(x)}</span>`).join('')}</div><button class="start" onclick="go(1)">Начать рассказ →</button></div></article>`}
    function card(c){return `<article class="enter"><div class="kicker"><span class="section">${esc(c.section)}</span><span>${esc(c.timing)}</span></div><h2>${esc(c.title)}</h2><p class="purpose">${esc(c.purpose)}</p><div class="label">Что сказать</div><ol class="say">${c.say.map(x=>`<li>${esc(x)}</li>`).join('')}</ol>${c.evidence?.length?`<div class="label">Факты, на которые опереться</div>${c.evidence.map(e=>`<div class="evidence"><strong>${esc(e.fact)}</strong><span>${esc(e.source)}</span></div>`).join('')}`:''}<div class="cue-grid"><div class="cue"><b>На что показать</b><p>${esc(c.visual)}</p></div><div class="cue"><b>Как перейти дальше</b><p>${esc(c.transition)}</p></div></div>${c.caution?`<div class="caution"><strong>Не переусильте:</strong> ${esc(c.caution)}</div>`:''}</article>`}
    function go(next){const total=DECK.cards.length+1;index=Math.max(0,Math.min(total-1,next));viewport.innerHTML=index===0?cover():card(DECK.cards[index-1]);viewport.scrollTop=0;document.getElementById('prev').disabled=index===0;document.getElementById('next').disabled=index===total-1;document.getElementById('counter').textContent=`${index+1} / ${total}`;document.getElementById('dots').innerHTML=Array.from({length:total},(_,i)=>`<button class="dot${i===index?' active':''}" aria-label="Карточка ${i+1}" onclick="go(${i})"></button>`).join('')}
    document.getElementById('prev').onclick=()=>go(index-1);document.getElementById('next').onclick=()=>go(index+1);
    document.addEventListener('keydown',event=>{if(event.key==='ArrowRight'||event.key==='ArrowDown')go(index+1);if(event.key==='ArrowLeft'||event.key==='ArrowUp')go(index-1)});
    viewport.addEventListener('touchstart',event=>{touchX=event.touches[0].clientX},{passive:true});viewport.addEventListener('touchend',event=>{if(touchX===null)return;const dx=touchX-event.changedTouches[0].clientX;if(Math.abs(dx)>50)go(index+(dx>0?1:-1));touchX=null},{passive:true});go(0);
  </script>
</body>
</html>
