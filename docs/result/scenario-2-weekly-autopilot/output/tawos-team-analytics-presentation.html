<!doctype html>
<html lang="ru" data-mozaika-brandbook="mozaika-brandbook/v1">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TAWOS Team Analytics · HTML-презентация</title>
  <style>
    :root{color-scheme:light;--canvas:#f4f1ec;--surface:#fff;--soft:#faf7f2;--line:#eae3d9;--ink:#3d3a42;--muted:#7d7774;--lav:#b8aee0;--lav-soft:#ede9f7;--lav-dark:#6b5ca5;--sage:#a8c6a1;--sage-soft:#e9f1e7;--sage-dark:#5e8a56;--rose:#dfa5ae;--rose-soft:#f7e8eb;--rose-dark:#b0566a;--gold:#e3c88a;--gold-soft:#f7f0de}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--canvas);color:var(--ink);font:16px/1.45 "Segoe UI",Arial,sans-serif}
    button{font:inherit}.deck{height:100%;display:grid;place-items:center;padding:22px}.slide{display:none;width:min(1180px,calc(100vw - 44px));height:min(680px,calc(100vh - 44px));overflow:auto;background:var(--surface);border:1px solid var(--line);border-radius:26px;padding:48px 54px 44px;box-shadow:0 8px 30px rgba(140,120,100,.08);position:relative;animation:enter .42s ease both}.slide.active{display:flex;flex-direction:column}.slide.cover{justify-content:center;background:linear-gradient(135deg,var(--lav-soft),#e4f2ef 62%,#f9ebe3)}
    @keyframes enter{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}.eyebrow{color:var(--lav-dark);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.slide h1{margin:12px 0 0;max-width:940px;font:700 clamp(38px,5vw,64px)/1.05 Georgia,serif;letter-spacing:-.025em}.slide h2{margin:9px 0 0;font:700 clamp(28px,3.5vw,44px)/1.12 Georgia,serif;letter-spacing:-.015em}.lead{max-width:900px;margin:15px 0 0;color:var(--muted);font-size:18px}.body{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:24px}.grid{display:grid;gap:16px}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr 1fr}.card,.chart,.callout{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:21px}.label{color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}.value{font-size:38px;font-weight:800;line-height:1;margin-top:11px}.note{color:var(--muted);font-size:13px;margin-top:10px}.chart svg{display:block;width:100%;height:290px}.bar{fill:var(--lav)}.bar.alert{fill:var(--rose)}.axis{stroke:#ddd7ce}.line{fill:none;stroke:var(--sage-dark);stroke-width:3}.signal{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:start;padding:20px 22px;border-radius:18px;background:var(--rose-soft)}.signal h3{margin:0;font-size:18px}.signal p{margin:6px 0 0;color:var(--muted)}.badge{background:#fff;color:var(--rose-dark);padding:5px 12px;border-radius:999px;font-size:11px;font-weight:800}.numbers{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px}.number{border:1px solid var(--line);border-radius:16px;padding:19px}.number b{display:block;font-size:36px}.number span{color:var(--muted);font-size:12px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--muted);font-size:10px;letter-spacing:.05em;text-transform:uppercase}td.num,th.num{text-align:right}.row-alert{background:var(--rose-soft)}.actions{display:grid;gap:14px}.action{display:grid;grid-template-columns:34px 1fr;gap:14px;align-items:start}.action i{display:grid;place-items:center;width:32px;height:32px;border-radius:10px;background:var(--lav-soft);color:var(--lav-dark);font-style:normal;font-weight:800}.action p{margin:3px 0 0}.success{margin-top:20px;background:var(--sage-soft)}.source{position:absolute;left:54px;bottom:20px;color:var(--muted);font-size:11px}.page{position:absolute;right:30px;top:24px;color:var(--muted);font-size:11px;font-weight:750}.nav{position:fixed;z-index:20;right:28px;bottom:24px;display:flex;gap:8px}.nav button{border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--ink);padding:9px 13px;cursor:pointer;box-shadow:0 4px 14px #00000012}.nav button:focus-visible{outline:3px solid #b8aee077}.progress{position:fixed;left:0;bottom:0;height:4px;background:var(--lav-dark);transition:width .35s ease}.template-warning{position:fixed;z-index:30;left:22px;top:18px;background:#fffaf0;border:1px solid var(--gold);padding:8px 12px;border-radius:10px;font-size:12px}.overview .slide{display:flex;height:320px;width:520px;transform:scale(.94);animation:none}.overview .deck{display:flex;align-items:flex-start;justify-content:center;flex-wrap:wrap;overflow:auto}.overview html,.overview body{overflow:auto}.overview .source{display:none}
    @media(max-width:850px){.slide{padding:34px 28px}.g4,.g3,.g2,.numbers{grid-template-columns:1fr 1fr}.source{left:28px}.signal{grid-template-columns:auto 1fr}.badge{grid-column:2}.nav{right:14px;bottom:14px}}@media(max-width:560px){.g3,.g2{grid-template-columns:1fr}.g4,.numbers{grid-template-columns:1fr 1fr}.slide{width:calc(100vw - 20px);height:calc(100vh - 20px);padding:28px 20px 54px;border-radius:18px}.body{justify-content:flex-start}.signal h3,.signal p{display:none}.source{left:20px}.lead{font-size:15px}}
    @media(prefers-reduced-motion:reduce){.slide,.progress{animation:none!important;transition:none!important}}@media print{html,body{overflow:visible;background:#fff}.deck{display:block;padding:0}.slide,.slide.active{display:flex;width:100%;height:100vh;border:0;border-radius:0;box-shadow:none;page-break-after:always}.nav,.progress,.template-warning{display:none!important}}
  </style>
</head>
<body>
  <div id="templateWarning" class="template-warning" hidden>Шаблон: замените payload проверенными данными перед выдачей.</div>
  <main class="deck" id="deck" aria-live="polite"></main>
  <nav class="nav" aria-label="Навигация"><button id="prev" type="button" aria-label="Предыдущий слайд">←</button><button id="overview" type="button">Обзор</button><button id="fullscreen" type="button">На весь экран</button><button id="next" type="button" aria-label="Следующий слайд">→</button></nav>
  <div class="progress" id="progress"></div>
  <script id="mozaika-presentation-data" type="application/json">
{"template_mode": false, "source_note": "Источник: TAWOS Team Analytics · Sprint-17 — Sprint-28", "slides": [{"kind": "cover", "eyebrow": "Пятничный автопилот · регулярный обзор", "title": "TAWOS Team Analytics", "lead": "Sprint-28: качество потока восстановилось на меньшем объёме", "pills": ["Sprint-28", "8 проектов · 7 команд", "162 задачи завершено"]}, {"kind": "context", "eyebrow": "О чём эти данные", "title": "Смотрим не только на объём, но и на предсказуемость", "lead": "Сводка охватывает 12 спринтов и сопоставляет поток, выполнение commitment и скорость прохождения задач.", "cards": [{"label": "Что измеряем", "text": "Создание и завершение задач, story points, cycle time, блокировки и переоткрытия."}, {"label": "Как сравниваем", "text": "Sprint-28 против Sprint-27 и диапазона Sprint-17 — Sprint-28."}, {"label": "Ограничение", "text": "Целевые уровни в источнике отсутствуют; сравнение с планом не выполнялось."}]}, {"kind": "kpis", "eyebrow": "Итоги периода", "title": "Качество выросло, хотя поток стал меньше", "lead": "Done rate и commitment улучшились, cycle time сократился; объём ниже пикового Sprint-27.", "kpis": [{"label": "Done rate", "value": "89.0%", "note": "+4.9 п.п. к Sprint-27"}, {"label": "Commitment", "value": "89.1%", "note": "+1.5 п.п."}, {"label": "Cycle time", "value": "5.9 дня", "note": "-17.1% к Sprint-27"}, {"label": "Velocity", "value": "1184 SP", "note": "-31.5% к Sprint-27"}]}, {"kind": "trend", "eyebrow": "Динамика", "title": "Sprint-28 вернулся к обычному диапазону качества", "lead": "Done rate 89,0% близок к историческому уровню, а снижение velocity отражает меньший объём работы.", "series": [{"label": "S17", "value": 1408.0, "quality": 90.0}, {"label": "S18", "value": 1184.0, "quality": 86.5}, {"label": "S19", "value": 1366.0, "quality": 89.9}, {"label": "S20", "value": 1228.0, "quality": 85.5}, {"label": "S21", "value": 1384.0, "quality": 89.6}, {"label": "S22", "value": 1370.0, "quality": 87.4}, {"label": "S23", "value": 1063.0, "quality": 90.2}, {"label": "S24", "value": 1363.0, "quality": 87.3}, {"label": "S25", "value": 1473.0, "quality": 88.7}, {"label": "S26", "value": 1335.0, "quality": 86.5}, {"label": "S27", "value": 1729.0, "quality": 84.1}, {"label": "S28", "value": 1184.0, "quality": 89.0}]}, {"kind": "teams", "eyebrow": "Разрез", "title": "Результат неоднороден по проектам", "lead": "Titanium SDK завершил 100% созданных задач; Moodle Platform — 72,5%.", "bars": [{"label": "Titanium SDK", "value": 100.0}, {"label": "Confluence Server", "value": 94.4}, {"label": "MongoDB Core Server", "value": 94.3}, {"label": "MongoDB Compass", "value": 93.8}, {"label": "Spring XD", "value": 92.9}, {"label": "Apache Mesos", "value": 90.9}, {"label": "Hyperledger Fabric", "value": 84.6}, {"label": "Moodle Platform", "value": 72.5}]}, {"kind": "anomaly", "eyebrow": "Главная точка внимания", "title": "Moodle: завершение отстаёт, но скорость прохождения улучшилась", "lead": "Done rate 72,5% остаётся самым низким в Sprint-28. При этом cycle time снизился на 35% к Sprint-27 — это локальная проблема завершения, а не доказанная перегрузка.", "badge": "Средняя важность", "numbers": [{"value": "72,5%", "label": "Done rate"}, {"value": "75,0%", "label": "Sprint-27"}, {"value": "−2,5 п.п.", "label": "Изменение"}, {"value": "−35,0%", "label": "Cycle time"}]}, {"kind": "table", "eyebrow": "Полная картина", "title": "Восемь проектов Sprint-28", "headers": ["Объект", "Команда", "Done rate", "Commitment", "Cycle time"], "rows": [["Apache Mesos", "Platform", "90.9%", "90.4%", "5.7 дня"], ["Confluence Server", "Backend", "94.4%", "98.5%", "5.1 дня"], ["Hyperledger Fabric", "Blockchain", "84.6%", "82.6%", "7.8 дня"], ["MongoDB Compass", "Frontend", "93.8%", "88.6%", "3.5 дня"], ["MongoDB Core Server", "Backend", "94.3%", "96.3%", "5.8 дня"], ["Moodle Platform", "Full-stack", "72.5%", "81.2%", "8.0 дня"], ["Spring XD", "Data", "92.9%", "75.9%", "6.2 дня"], ["Titanium SDK", "Mobile", "100.0%", "100.0%", "4.8 дня"]]}, {"kind": "actions", "eyebrow": "Выводы и действия", "title": "Сфокусироваться на трёх разных причинах отклонений", "actions": ["Для Moodle разобрать незавершённые задачи и сохранить улучшившийся cycle time.", "Для MongoDB Core Server проверить причины роста cycle time на 20,8% при хорошем завершении.", "Для Spring XD уточнить расхождение между высоким done rate и commitment 75,9%."], "summary": "Общесистемной деградации качества в Sprint-28 не видно; управленческое действие — адресная работа с тремя локальными сигналами."}]}
</script>
  <script>
    const data=JSON.parse(document.getElementById('mozaika-presentation-data').textContent),deck=document.getElementById('deck');let index=0;
    const esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));const source=()=>`<div class="source">${esc(data.source_note)}</div>`;const frame=(s,i,body)=>`<section class="slide ${s.kind==='cover'?'cover':''}" data-slide="${i}" aria-label="Слайд ${i+1}: ${esc(s.title)}"><span class="page">${String(i+1).padStart(2,'0')}</span><div class="eyebrow">${esc(s.eyebrow)}</div><h${s.kind==='cover'?1:2}>${esc(s.title)}</h${s.kind==='cover'?1:2}>${s.lead?`<div class="lead">${esc(s.lead)}</div>`:''}${body}${source()}</section>`;
    function trendSvg(items){const w=800,h=300,p=40,max=Math.max(...items.map(x=>x.value),1),q0=Math.min(...items.map(x=>x.quality)),q1=Math.max(...items.map(x=>x.quality),q0+1),step=(w-p*2)/items.length;let bars='',path='',dots='';items.forEach((x,i)=>{const bx=p+i*step+step*.2,bw=step*.6,bh=x.value/max*(h-p*2),by=h-p-bh,px=bx+bw/2,py=h-p-(x.quality-q0)/(q1-q0)*(h-p*2);bars+=`<rect class="bar ${i===items.length-1?'alert':''}" x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="6"/><text x="${px}" y="${h-12}" text-anchor="middle" font-size="12" fill="#7d7774">${esc(x.label)}</text>`;path+=`${i?'L':'M'}${px},${py}`;dots+=`<circle cx="${px}" cy="${py}" r="4" fill="#5e8a56"/>`});return `<svg viewBox="0 0 ${w} ${h}" role="img"><line class="axis" x1="${p}" y1="${h-p}" x2="${w-p}" y2="${h-p}"/>${bars}<path class="line" d="${path}"/>${dots}</svg>`}
    function body(s){if(s.kind==='cover')return `<div class="body"><div class="grid g3">${s.pills.map(x=>`<div class="card">${esc(x)}</div>`).join('')}</div></div>`;if(s.kind==='context')return `<div class="body grid g3">${s.cards.map(x=>`<div class="card"><div class="label">${esc(x.label)}</div><div style="font-weight:650;margin-top:12px">${esc(x.text)}</div></div>`).join('')}</div>`;if(s.kind==='kpis')return `<div class="body grid g4">${s.kpis.map(x=>`<div class="card"><div class="label">${esc(x.label)}</div><div class="value">${esc(x.value)}</div><div class="note">${esc(x.note)}</div></div>`).join('')}</div>`;if(s.kind==='trend')return `<div class="body"><div class="chart">${trendSvg(s.series)}</div></div>`;if(s.kind==='teams')return `<div class="body"><div class="chart"><svg viewBox="0 0 800 300">${s.bars.map((x,i)=>`<text x="16" y="${55+i*72}" font-size="14">${esc(x.label)}</text><rect class="bar ${i===s.bars.length-1?'alert':''}" x="100" y="${35+i*72}" width="${Math.max(15,x.value*6)}" height="34" rx="6"/><text x="${112+Math.max(15,x.value*6)}" y="${58+i*72}" font-size="13">${esc(x.value)}</text>`).join('')}</svg></div></div>`;if(s.kind==='anomaly')return `<div class="body"><div class="signal"><span>🔴</span><div><h3>${esc(s.title)}</h3><p>${esc(s.lead)}</p></div><span class="badge">${esc(s.badge)}</span></div><div class="numbers">${s.numbers.map(x=>`<div class="number"><b>${esc(x.value)}</b><span>${esc(x.label)}</span></div>`).join('')}</div></div>`;if(s.kind==='table')return `<div class="body table-wrap"><table><thead><tr>${s.headers.map((h,i)=>`<th class="${i>1?'num':''}">${esc(h)}</th>`).join('')}</tr></thead><tbody>${s.rows.map(r=>`<tr class="${String(r.at(-1)).toLowerCase().includes('выс')?'row-alert':''}">${r.map((c,i)=>`<td class="${i>1?'num':''}">${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;return `<div class="body"><div class="actions">${s.actions.map((x,i)=>`<div class="action"><i>${i+1}</i><p>${esc(x)}</p></div>`).join('')}</div><div class="callout success">${esc(s.summary)}</div></div>`}
    deck.innerHTML=data.slides.map((s,i)=>frame(s,i,body(s))).join('');document.getElementById('templateWarning').hidden=!data.template_mode;const slides=[...document.querySelectorAll('.slide')];function show(next){index=Math.max(0,Math.min(slides.length-1,next));slides.forEach((s,i)=>s.classList.toggle('active',i===index));document.getElementById('progress').style.width=`${(index+1)/slides.length*100}%`;location.hash=`slide-${index+1}`}
    document.getElementById('prev').onclick=()=>show(index-1);document.getElementById('next').onclick=()=>show(index+1);document.getElementById('overview').onclick=()=>document.body.classList.toggle('overview');document.getElementById('fullscreen').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();addEventListener('keydown',e=>{if(['ArrowRight','PageDown',' '].includes(e.key))show(index+1);if(['ArrowLeft','PageUp'].includes(e.key))show(index-1);if(e.key.toLowerCase()==='o')document.body.classList.toggle('overview');if(e.key==='Escape')document.body.classList.remove('overview')});const hash=Number(location.hash.replace('#slide-',''));show(Number.isFinite(hash)&&hash>0?hash-1:0);
  </script>
</body>
</html>
